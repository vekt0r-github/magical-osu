<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>magical-osu</title>
        <link rel="stylesheet" href="./css/default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    </head>

    <body class="home-page">

        <div class="bg-overlay"></div>

        <header class="home-header">
            <div class="home-title">
                <a href="./" class="site-name">magical-osu</a>
                <span class="site-subtitle translatable" data-en="Magical Mirai 2026" data-jp="マジカルミライ 2026">Magical Mirai 2026</span>
            </div>
            <div class="home-lang">
                <button class="lang-toggle" id="lang-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle language between English and Japanese">
    <span class="lang-option lang-en active" data-lang="en">EN</span>
    <span class="lang-option lang-jp" data-lang="jp">日本語</span>
</button>
            </div>
        </header>

        <main class="home-main">

            <div id="layout-original" class="layout-container">
                <button class="btn-main translatable" id="btn-play" data-en="Play" data-jp="プレイ">Play</button>
                <a href="./tutorial/" class="btn-main translatable" data-en="Tutorial" data-jp="チュートリアル">Tutorial</a>
                <button class="btn-main translatable" id="btn-info" data-en="Info" data-jp="情報">Info</button>
            </div>

            <div id="layout-play" class="layout-container" hidden>
                <div class="song-list">
                    <a href="./song1/" class="btn-main translatable" data-en="Song 1" data-jp="ソング 1">Song 1</a>
                    <p class="placeholder-text translatable" data-en="More songs will be added later." data-jp="他の曲は後に追加されます。">More songs will be added later.</p>
                </div>
                <button class="btn-back translatable" id="back-from-play" data-en="Back" data-jp="戻る">Back</button>
            </div>

            <div id="layout-info" class="layout-container" hidden>
                <div class="info-content">
                    <h1 id="info">Info</h1>
<p>Rhythm game.</p>
<h2 id="authors">Authors</h2>
<p><a href="https://github.com/Twigums">Twigums</a>, <a href="https://github.com/vekt0r-github">vekt0r-github</a></p>
                </div>
                <button class="btn-back translatable" id="back-from-info" data-en="Back" data-jp="戻る">Back</button>
            </div>

        </main>

        <footer class="home-footer">
            <a href="https://github.com/Twigums/magical-osu" style="text-decoration: none;">
                <img src="./images/github-white.svg" title="GitHub" alt="GitHub logo" />
            </a>
            <a href="https://jaspervdj.be/hakyll/" style="text-decoration: none;">
                <img src="./images/hakyll-white.svg" title="Proudly generated by Hakyll" alt="Hakyll logo" />
            </a>
        </footer>

        <script src="./js/main.js"></script>

    </body>
</html>
